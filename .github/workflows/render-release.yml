name: Render Archive Release Zips

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag that contains one or more archive zip assets, for example v1"
        required: true
        type: string
      workers_per_video:
        description: "Parallel chunk workers per video"
        required: true
        type: number
        default: 4
      max_total_render_jobs:
        description: "Maximum total render jobs to run at once"
        required: true
        type: number
        default: 10

permissions:
  contents: read

jobs:
  discover:
    name: Find release zips
    runs-on: ubuntu-latest
    outputs:
      chunks: ${{ steps.matrices.outputs.chunks }}
      videos: ${{ steps.matrices.outputs.videos }}
    steps:
      - name: Checkout renderer
        uses: actions/checkout@v4

      - name: Download release zips
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          mkdir -p incoming
          gh release download "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --pattern "*.zip" --dir incoming
          ls -lh incoming

      - name: Build render matrices
        id: matrices
        run: node .github/scripts/make-render-matrices.mjs incoming "${{ inputs.workers_per_video }}" >> "$GITHUB_OUTPUT"

  render-chunks:
    name: Render ${{ matrix.stem }} chunk ${{ matrix.chunk_id }}
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJSON(inputs.max_total_render_jobs) }}
      matrix: ${{ fromJSON(needs.discover.outputs.chunks) }}
    steps:
      - name: Checkout renderer
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install renderer dependencies
        run: npm ci

      - name: Download archive package
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          ZIP_NAME: ${{ matrix.zip_name }}
        run: |
          rm -rf incoming public/audio public/images public/sfx out
          mkdir -p incoming public out
          gh release download "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --pattern "$ZIP_NAME" --dir incoming
          unzip -o "incoming/$ZIP_NAME" -d public
          test -f public/archive.json
          node .github/scripts/sanitize-package.mjs public

      - name: Render video chunk
        run: |
          cores="$(nproc)"
          if [ "$cores" -lt 2 ]; then
            safe_concurrency="$cores"
          else
            safe_concurrency="2"
          fi
          npx remotion render src/index.ts ArchiveDocumentary "out/${{ matrix.stem }}_chunk_${{ matrix.chunk_id }}.mp4" \
            --codec=h264 \
            --muted \
            --frames="${{ matrix.frames }}" \
            --concurrency="$safe_concurrency"

      - name: Upload rendered chunk
        uses: actions/upload-artifact@v4
        with:
          name: chunk-${{ matrix.stem }}-${{ matrix.chunk_id }}
          path: out/${{ matrix.stem }}_chunk_${{ matrix.chunk_id }}.mp4
          if-no-files-found: error

  combine-videos:
    name: Combine ${{ matrix.stem }}
    needs: [discover, render-chunks]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.discover.outputs.videos) }}
    steps:
      - name: Checkout renderer
        uses: actions/checkout@v4

      - name: Download rendered chunks
        uses: actions/download-artifact@v4
        with:
          pattern: chunk-${{ matrix.stem }}-*
          merge-multiple: true
          path: chunks

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Download archive package for audio
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          ZIP_NAME: ${{ matrix.zip_name }}
        run: |
          rm -rf incoming public out audio-mix-assets
          mkdir -p incoming public out
          gh release download "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --pattern "$ZIP_NAME" --dir incoming
          unzip -o "incoming/$ZIP_NAME" -d public
          test -f public/archive.json
          node .github/scripts/sanitize-package.mjs public

      - name: Stitch chunks and add audio
        run: |
          rm -f chunk-list.txt
          for file in $(find chunks -name "${{ matrix.stem }}_chunk_*.mp4" | sort); do
            echo "file '$(realpath "$file")'" >> chunk-list.txt
          done
          test -s chunk-list.txt
          ffmpeg -y -f concat -safe 0 -i chunk-list.txt -c copy "out/${{ matrix.stem }}_silent.mp4"
          node .github/scripts/mix-audio.mjs "out/${{ matrix.stem }}_audio.m4a"
          if [ -f "out/${{ matrix.stem }}_audio.m4a" ]; then
            ffmpeg -y -i "out/${{ matrix.stem }}_silent.mp4" -i "out/${{ matrix.stem }}_audio.m4a" \
              -map 0:v:0 -map 1:a:0 -c:v copy -c:a aac -shortest "out/${{ matrix.stem }}.mp4"
          else
            cp "out/${{ matrix.stem }}_silent.mp4" "out/${{ matrix.stem }}.mp4"
          fi

      - name: Upload rendered video
        uses: actions/upload-artifact@v4
        with:
          name: video-${{ matrix.stem }}
          path: out/${{ matrix.stem }}.mp4
          if-no-files-found: error

  collect:
    name: Collect videos
    needs: combine-videos
    runs-on: ubuntu-latest
    if: ${{ success() }}
    steps:
      - name: Download rendered videos
        uses: actions/download-artifact@v4
        with:
          pattern: video-*
          merge-multiple: true
          path: rendered

      - name: Create final zip
        run: |
          cd rendered
          zip -9 ../rendered-archive-videos.zip ./*.mp4

      - name: Upload final zip
        uses: actions/upload-artifact@v4
        with:
          name: rendered-archive-videos
          path: rendered-archive-videos.zip
          if-no-files-found: error
